# =========================================================================
# CONFIG REDIS OPTIMAL UNTUK HORIZONTAL SCALING & OBSERVALIBILITY (FASE 5)
# =========================================================================

# --- 1. JARINGAN & KONEKSI ---
port 6379
bind 127.0.0.1
tcp-backlog 511
timeout 0
tcp-keepalive 300

# --- 2. BATASAN MEMORI (MEMORY MANAGEMENT) ---
# Alokasi memori disesuaikan dengan target kapasitas instans produksi
maxmemory 2gb
# Kebijakan pembersihan ketika memori penuh (LRU terbaik untuk cache & session)
maxmemory-policy allkeys-lru

# --- 3. PERSISTENSI RDB (SNAPSHOT DATA KE DISK) ---
# Ambil snapshot ke disk jika terjadi perubahan data pada selang waktu berikut:
save 900 1      # Setiap 15 menit jika minimal 1 key berubah
save 300 10     # Setiap 5 menit jika minimal 10 key berubah
save 60 10000   # Setiap 1 menit jika minimal 10000 key berubah

rdbcompression yes
dbfilename dump.rdb
dir ./data

# --- 4. PERSISTENSI AOF (APPEND-ONLY FILE) ---
# AOF memberikan durabilitas data yang lebih tinggi untuk financial state & websocket settings
appendonly yes
appendfilename "appendonly.aof"

# Sinkronisasi ke disk setiap detik (paling optimal antara performa & keamanan data)
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes

# --- 5. PRODUKSI READY & TUNING ---
# Kurangi overhead log di production
loglevel notice
databases 16
